[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: res.cloudinary.com; connect-src 'self' https: wss:; frame-src js.stripe.com; font-src 'self' data:; object-src 'none'; base-uri 'self'"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
